<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permit Pulse — Simpson Strong-Tie</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #1a1033;
    --bg-secondary: #231845;
    --bg-card: #271d4d;
    --border: #3d2e6b;
    --border-light: #4d3e7b;
    --text-primary: #f0e6ff;
    --text-secondary: #b8a5d4;
    --text-muted: #8875a8;
    --accent: #FA4616;
    --negative: #fb7185;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image: 
      radial-gradient(circle at 20% 30%, rgba(250,70,22,0.08), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(167,139,250,0.08), transparent 40%);
  }
  .gate {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(250,70,22,0.15);
  }
  .gate-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .gate-logo img {
    height: 38px;
    border-radius: 3px;
  }
  .gate-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
  }
  .gate-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.01em;
  }
  .gate-heading {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .gate-subhead {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 24px;
  }
  .gate-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .gate-input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: border 0.15s, box-shadow 0.15s;
  }
  .gate-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(250,70,22,0.15);
  }
  .gate-button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.15s, transform 0.05s;
  }
  .gate-button:hover { filter: brightness(1.1); }
  .gate-button:active { transform: translateY(1px); }
  .gate-error {
    color: var(--negative);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    min-height: 16px;
    margin-top: 4px;
  }
  .gate-footer {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="gate">
    <div class="gate-logo">
      <img src="sst-logo.jpg" alt="Simpson Strong-Tie">
      <div class="gate-divider"></div>
      <span class="gate-title">Permit Pulse</span>
    </div>
    <div class="gate-heading">Restricted Access</div>
    <div class="gate-subhead">This dashboard is internal to Simpson Strong-Tie. Enter the access code to continue.</div>
    <form class="gate-form" id="gateForm" autocomplete="off">
      <input type="password" class="gate-input" id="pwd" placeholder="Access code" autofocus required>
      <div class="gate-error" id="err"></div>
      <button type="submit" class="gate-button">Enter</button>
    </form>
    <div class="gate-footer">
      Construction market intelligence · Census · FRED · BLS · NAHB · FEMA · Dodge · Zonda · SST internal data
    </div>
  </div>

<script>
// SHA-256 hash of the access code
const TARGET_HASH = 'a09d8a1803eed37e126266eb080d5d6e5857980486d458854aef9e283f5d68bb';

async function sha256(text) {
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Auto-redirect if already authorized in this session
if (sessionStorage.getItem('pp_auth') === TARGET_HASH) {
  window.location.replace('app.html');
}

document.getElementById('gateForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('err');
  const input = document.getElementById('pwd').value;
  errEl.textContent = '';
  
  const hash = await sha256(input);
  if (hash === TARGET_HASH) {
    try { sessionStorage.setItem('pp_auth', TARGET_HASH); } catch (e) {}
    window.location.href = 'app.html';
  } else {
    errEl.textContent = 'Invalid access code';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
});
</script>
</body>
</html>
